    --flair-bg-raised: '#1f2335'
    --flair-bg-search: '#55473a'
    --flair-bg-selection: '#374465'
    --flair-bg-sidebar: '#16161e'
    --flair-bg-statusbar: '#16161e'
    --flair-bg-sunken: '#16161e'
    --flair-border-default: '#32364e'
    --flair-border-focus: '#5d7ab8'
    --flair-border-muted: '#1f2335'
    --flair-diff-added-bg: '#3b4837'
    --flair-diff-added-fg: '#afd67a'
    --flair-diff-added-sign: '#afd67a'
